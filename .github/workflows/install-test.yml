name: install-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: install + bundled-demo end-to-end (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check checked-out files
        run: |
          ls -la
          test -f install.sh
          test -x shared/scripts/check-spine.sh
          test -x shared/scripts/install-spine.sh
          test -x shared/scripts/setup-veil.sh
          test -x skills/receipts-csv/scripts/run-receipt.sh
          test -f skills/receipts-csv/assets/channel-spend/agency-report.csv
          test -f skills/receipts-csv/assets/channel-spend/bank-statement.csv

      - name: bash syntax-check every script
        run: |
          for f in $(git ls-files '*.sh'); do
            echo "checking $f"
            bash -n "$f"
          done

      - name: Install via install.sh against ephemeral HOME
        env:
          # Send the install into a sandbox HOME so we don't pollute the runner
          # with arbitrary dotfiles, and so we can validate the multi-harness
          # auto-detection works for a fresh Claude Code user.
          TEST_HOME: ${{ runner.temp }}/sandbox-home
        run: |
          # Pre-create skill dirs for two harnesses so we exercise the
          # multi-harness symlink path, not just the single-harness path.
          mkdir -p "$TEST_HOME/.claude/skills"
          mkdir -p "$TEST_HOME/.codex/skills"
          # Place the bundle directly so install.sh detects it via its
          # back-compat path and skips re-cloning.
          cp -R "$GITHUB_WORKSPACE/." "$TEST_HOME/.claude/skills/receipts-bundle"
          HOME="$TEST_HOME" SKIP_SPINE_INSTALL=1 bash "$TEST_HOME/.claude/skills/receipts-bundle/install.sh"
          # Both harnesses should now have working symlinks pointing at the bundle.
          for h in claude codex; do
            for s in receipts-csv receipts-flywheel; do
              link="$TEST_HOME/.$h/skills/$s"
              test -L "$link" || { echo "MISSING SYMLINK: $link"; exit 1; }
              target="$(readlink "$link")"
              test -d "$target" || { echo "BROKEN SYMLINK: $link → $target"; exit 1; }
              echo "ok: $link → $target"
            done
          done

      - name: Set up Linuxbrew (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          # Linuxbrew is preinstalled on ubuntu-latest GitHub runners but
          # not on PATH by default — wire it up.
          test -x /home/linuxbrew/.linuxbrew/bin/brew
          echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> "$HOME/.bash_profile"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Install spine tools via install-spine.sh
        run: |
          ./shared/scripts/install-spine.sh
          shape --version
          rvl --version
          pack --version

      - name: check-spine.sh reports all required tools installed
        run: |
          ./shared/scripts/check-spine.sh
          ./shared/scripts/check-spine.sh | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          missing = [t["name"] for t in d["tools"] if t["required"] and not t["installed"]]
          if missing:
              print("ERROR: required tools missing:", missing)
              sys.exit(1)
          print("ok — all required spine tools installed")
          '

      - name: Run bundled demo end-to-end
        run: |
          OUT="${{ runner.temp }}/ci-receipt"
          ./skills/receipts-csv/scripts/run-receipt.sh \
            ./skills/receipts-csv/assets/channel-spend/agency-report.csv \
            ./skills/receipts-csv/assets/channel-spend/bank-statement.csv \
            --key channel \
            --out "$OUT" \
            --note "ci smoke test"
          test -f "$OUT/manifest.json"
          test -f "$OUT/shape.report.json"
          test -f "$OUT/rvl.report.json"
          pack verify "$OUT" --no-witness

      - name: Refusal paths exit with code 2
        run: |
          # Non-existent file
          set +e
          ./skills/receipts-csv/scripts/run-receipt.sh /nope-old.csv /nope-new.csv --key x --out /tmp/r1 2>/dev/null >/dev/null
          rc=$?
          set -e
          [[ $rc -eq 2 ]] || { echo "expected exit 2 for missing file, got $rc"; exit 1; }
          echo "ok — missing file: exit 2"

          # Pre-existing non-empty output dir
          mkdir -p /tmp/already-exists
          touch /tmp/already-exists/something
          set +e
          ./skills/receipts-csv/scripts/run-receipt.sh \
            ./skills/receipts-csv/assets/channel-spend/agency-report.csv \
            ./skills/receipts-csv/assets/channel-spend/bank-statement.csv \
            --key channel --out /tmp/already-exists 2>/dev/null >/dev/null
          rc=$?
          set -e
          [[ $rc -eq 2 ]] || { echo "expected exit 2 for pack collision, got $rc"; exit 1; }
          echo "ok — pack collision: exit 2"

      - name: Summary
        if: success()
        run: |
          echo "::notice::receipts install + demo end-to-end OK"
