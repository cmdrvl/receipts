name: install-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: install + bundled-demo end-to-end (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check checked-out files
        run: |
          ls -la
          test -f install.sh
          # Both skills must be self-contained — vendored copies of the
          # spine-install + veil scripts so each skill works standalone
          # when symlinked into a harness (or pushed to jeffreys-skills.md).
          for s in receipts-csv all-the-receipts; do
            test -x skills/$s/scripts/check-spine.sh
            test -x skills/$s/scripts/install-spine.sh
            test -f skills/$s/scripts/install-spine.ps1
            test -x skills/$s/scripts/setup-veil.sh
            test -x skills/$s/scripts/run-receipt.sh
            test -f skills/$s/scripts/run-receipt.ps1
            test -f skills/$s/assets/channel-spend/agency-report.csv
            test -f skills/$s/assets/channel-spend/bank-statement.csv
          done

          # Drift check: vendored copies must match between the two skills.
          # receipts-csv is the canonical home (see AGENTS.md). When you
          # update one, sync the other in the same commit.
          for f in check-spine.sh install-spine.sh install-spine.ps1 setup-veil.sh run-receipt.sh run-receipt.ps1; do
            diff -q skills/receipts-csv/scripts/$f skills/all-the-receipts/scripts/$f \
              || { echo "ERROR: $f drifted between receipts-csv and all-the-receipts"; exit 1; }
          done

          # Also check the bundled CSV samples match.
          for f in agency-report.csv bank-statement.csv; do
            diff -q skills/receipts-csv/assets/channel-spend/$f \
                    skills/all-the-receipts/assets/channel-spend/$f \
              || { echo "ERROR: assets/$f drifted"; exit 1; }
          done

      - name: bash syntax-check every script
        run: |
          for f in $(git ls-files '*.sh'); do
            echo "checking $f"
            bash -n "$f"
          done

      - name: Install via install.sh against ephemeral HOME
        env:
          # Send the install into a sandbox HOME so we don't pollute the runner
          # with arbitrary dotfiles, and so we can validate the multi-harness
          # auto-detection works for a fresh Claude Code user.
          TEST_HOME: ${{ runner.temp }}/sandbox-home
        run: |
          # Pre-create skill dirs for two harnesses so we exercise the
          # multi-harness symlink path, not just the single-harness path.
          mkdir -p "$TEST_HOME/.claude/skills"
          mkdir -p "$TEST_HOME/.codex/skills"
          # Place the bundle directly so install.sh detects it via its
          # back-compat path and skips re-cloning.
          cp -R "$GITHUB_WORKSPACE/." "$TEST_HOME/.claude/skills/receipts-bundle"
          HOME="$TEST_HOME" SKIP_SPINE_INSTALL=1 bash "$TEST_HOME/.claude/skills/receipts-bundle/install.sh"
          # Both harnesses should now have working symlinks pointing at the bundle.
          for h in claude codex; do
            for s in receipts-csv all-the-receipts; do
              link="$TEST_HOME/.$h/skills/$s"
              test -L "$link" || { echo "MISSING SYMLINK: $link"; exit 1; }
              target="$(readlink "$link")"
              test -d "$target" || { echo "BROKEN SYMLINK: $link → $target"; exit 1; }
              echo "ok: $link → $target"
            done
          done

      - name: Set up Linuxbrew (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          # Linuxbrew is preinstalled on ubuntu-latest GitHub runners but
          # not on PATH by default — wire it up.
          test -x /home/linuxbrew/.linuxbrew/bin/brew
          echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> "$HOME/.bash_profile"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Install spine tools via install-spine.sh
        run: |
          ./skills/receipts-csv/scripts/install-spine.sh
          shape --version
          rvl --version
          pack --version

      - name: check-spine.sh reports all required tools installed
        run: |
          ./skills/receipts-csv/scripts/check-spine.sh
          ./skills/receipts-csv/scripts/check-spine.sh | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          missing = [t["name"] for t in d["tools"] if t["required"] and not t["installed"]]
          if missing:
              print("ERROR: required tools missing:", missing)
              sys.exit(1)
          print("ok — all required spine tools installed")
          '

      - name: Run bundled demo end-to-end (receipts-csv)
        run: |
          OUT="${{ runner.temp }}/ci-receipt-csv"
          ./skills/receipts-csv/scripts/run-receipt.sh \
            ./skills/receipts-csv/assets/channel-spend/agency-report.csv \
            ./skills/receipts-csv/assets/channel-spend/bank-statement.csv \
            --key channel \
            --out "$OUT" \
            --note "ci smoke test"
          test -f "$OUT/manifest.json"
          test -f "$OUT/shape.report.json"
          test -f "$OUT/rvl.report.json"
          pack verify "$OUT" --no-witness

      - name: Run bundled demo end-to-end (all-the-receipts)
        run: |
          # all-the-receipts ships its own copy of the CSV runner and
          # sample. Catch drift between the two skills here.
          OUT="${{ runner.temp }}/ci-receipt-atr"
          ./skills/all-the-receipts/scripts/run-receipt.sh \
            ./skills/all-the-receipts/assets/channel-spend/agency-report.csv \
            ./skills/all-the-receipts/assets/channel-spend/bank-statement.csv \
            --key channel \
            --out "$OUT" \
            --note "ci smoke test (all-the-receipts)"
          test -f "$OUT/manifest.json"
          test -f "$OUT/shape.report.json"
          test -f "$OUT/rvl.report.json"
          pack verify "$OUT" --no-witness

      - name: Refusal paths exit with code 2
        run: |
          echo "pack version: $(pack --version)"
          echo "shape version: $(shape --version)"
          echo "rvl version: $(rvl --version)"
          # Use runner.temp for outputs to avoid /tmp → /private/tmp symlink
          # weirdness on macOS runners.
          TMP="${{ runner.temp }}"

          # Non-existent file
          set +e
          ./skills/receipts-csv/scripts/run-receipt.sh /nope-old.csv /nope-new.csv --key x --out "$TMP/r1" >/dev/null 2>&1
          rc=$?
          set -e
          [[ $rc -eq 2 ]] || { echo "expected exit 2 for missing file, got $rc"; exit 1; }
          echo "ok — missing file: exit 2"

          # Pre-existing non-empty output dir — should fail at pack seal
          COLLISION="$TMP/already-exists"
          mkdir -p "$COLLISION"
          touch "$COLLISION/something"
          set +e
          ./skills/receipts-csv/scripts/run-receipt.sh \
            ./skills/receipts-csv/assets/channel-spend/agency-report.csv \
            ./skills/receipts-csv/assets/channel-spend/bank-statement.csv \
            --key channel --out "$COLLISION" > /tmp/wrapper.out 2>&1
          rc=$?
          set -e
          if [[ $rc -ne 2 ]]; then
            echo "expected exit 2 for pack collision, got $rc"
            echo "--- wrapper output ---"
            cat /tmp/wrapper.out
            echo "--- pack direct repro ---"
            set +e
            pack seal ./skills/receipts-csv/assets/channel-spend/agency-report.csv \
              --output "$COLLISION" --no-witness
            echo "direct rc=$?"
            set -e
            exit 1
          fi
          echo "ok — pack collision: exit 2"

      - name: Summary
        if: success()
        run: |
          echo "::notice::receipts install + demo end-to-end OK"

  smoke-windows:
    name: install + bundled-demo end-to-end (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check
        run: |
          $files = @('install.ps1',
                     'skills/receipts-csv/scripts/install-spine.ps1',
                     'skills/receipts-csv/scripts/run-receipt.ps1',
                     'skills/all-the-receipts/scripts/install-spine.ps1',
                     'skills/all-the-receipts/scripts/run-receipt.ps1')
          foreach ($f in $files) {
            $tokens = $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Error "Syntax errors in $f"
              $errors | ForEach-Object { Write-Host $_ }
              exit 1
            }
            Write-Host "ok: $f"
          }

      - name: Install spine binaries via install-spine.ps1
        run: |
          ./skills/receipts-csv/scripts/install-spine.ps1
          # The script adds to user PATH for future shells; expose in this one too
          $env:Path = "$env:Path;$env:USERPROFILE\.cmdrvl\bin"
          shape --version
          rvl --version
          pack --version

      - name: Run bundled demo end-to-end (receipts-csv)
        run: |
          $env:Path = "$env:Path;$env:USERPROFILE\.cmdrvl\bin"
          $out = Join-Path $env:RUNNER_TEMP "ci-receipt-csv"
          ./skills/receipts-csv/scripts/run-receipt.ps1 `
            ./skills/receipts-csv/assets/channel-spend/agency-report.csv `
            ./skills/receipts-csv/assets/channel-spend/bank-statement.csv `
            -Key channel -Out $out -Note "ci windows smoke"
          if (-not (Test-Path (Join-Path $out "manifest.json"))) {
            Write-Error "manifest.json missing"
            exit 1
          }
          pack verify $out --no-witness
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run bundled demo end-to-end (all-the-receipts)
        run: |
          $env:Path = "$env:Path;$env:USERPROFILE\.cmdrvl\bin"
          $out = Join-Path $env:RUNNER_TEMP "ci-receipt-atr"
          ./skills/all-the-receipts/scripts/run-receipt.ps1 `
            ./skills/all-the-receipts/assets/channel-spend/agency-report.csv `
            ./skills/all-the-receipts/assets/channel-spend/bank-statement.csv `
            -Key channel -Out $out -Note "ci windows smoke (all-the-receipts)"
          if (-not (Test-Path (Join-Path $out "manifest.json"))) {
            Write-Error "manifest.json missing"
            exit 1
          }
          pack verify $out --no-witness
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Refusal paths exit non-zero
        run: |
          $env:Path = "$env:Path;$env:USERPROFILE\.cmdrvl\bin"
          $tmp = $env:RUNNER_TEMP
          $script = (Resolve-Path "./skills/receipts-csv/scripts/run-receipt.ps1").Path
          $old = (Resolve-Path "./skills/receipts-csv/assets/channel-spend/agency-report.csv").Path
          $new = (Resolve-Path "./skills/receipts-csv/assets/channel-spend/bank-statement.csv").Path

          # NOTE: invoke via `pwsh -File` so the script runs as a subprocess
          # and its exit code is captured in $LASTEXITCODE. Same-process
          # `./script.ps1` invocation exits the parent without setting
          # $LASTEXITCODE — a PowerShell behavior, not a bug in run-receipt.

          # Missing file
          pwsh -NoProfile -File $script (Join-Path $tmp "nope-old.csv") (Join-Path $tmp "nope-new.csv") -Key x -Out (Join-Path $tmp "r1") *> $null
          if ($LASTEXITCODE -ne 2) {
            Write-Error "expected exit 2 for missing file, got $LASTEXITCODE"
            exit 1
          }
          Write-Host "ok — missing file: exit 2"

          # Pack collision: pre-existing non-empty output dir
          $collision = Join-Path $tmp "already-exists"
          New-Item -ItemType Directory -Force -Path $collision | Out-Null
          New-Item -ItemType File -Force -Path (Join-Path $collision "something") | Out-Null
          pwsh -NoProfile -File $script $old $new -Key channel -Out $collision *> $null
          if ($LASTEXITCODE -ne 2) {
            Write-Error "expected exit 2 for pack collision, got $LASTEXITCODE"
            exit 1
          }
          Write-Host "ok — pack collision: exit 2"
          # GitHub Actions pwsh host treats $LASTEXITCODE != 0 at end-of-step
          # as failure. Last `pwsh -File` left it at 2 by design (refusal).
          # Reset before the step exits naturally.
          $global:LASTEXITCODE = 0
          exit 0
